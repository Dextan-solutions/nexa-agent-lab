name: CI

on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff mypy
      - run: ruff check backend/
        working-directory: agenthive
      - run: mypy backend/ --ignore-missing-imports
        working-directory: agenthive

  structure-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check no duplicate module roots
        working-directory: agenthive
        run: |
          if [ -d "backend/backend" ]; then
            echo "ERROR: duplicate backend folder still exists"
            exit 1
          fi
          echo "Structure: OK"
          if [ -d "backend/db" ] && [ -d "db" ]; then
            echo "ERROR: duplicate module roots — backend/db and db both exist"
            exit 1
          fi
          echo "Module structure: OK"

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose build
        working-directory: agenthive
      - run: docker compose up -d
        working-directory: agenthive
      - run: sleep 30
      - run: docker compose ps -a
        working-directory: agenthive
      - run: docker compose logs db-init
        working-directory: agenthive
      - run: docker compose exec backend python /app/db/healthcheck.py
        working-directory: agenthive
      - run: docker compose down -v
        working-directory: agenthive

